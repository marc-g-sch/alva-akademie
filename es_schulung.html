<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALVA Akademie — Einstieg in den Mieterstrom</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0F1F3D; --navy2:#162848; --navy3:#1E3A5F;
  --yellow:#FFFF00; --white:#FFFFFF;
  --grey:#F3F4F6; --grey2:#E5E7EB; --mid:#6B7280; --dark:#1F2937;
  --border:#E5E7EB; --ok:#16A34A; --ok-bg:#F0FDF4;
  --err:#DC2626; --err-bg:#FEF2F2;
  --blue:#3B82F6; --blue-bg:#EFF6FF;
  --orange:#F97316; --orange-bg:#FFF7ED;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--grey);color:var(--dark);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* ── TOPBAR ── */
.topbar{background:var(--navy);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:500;}
.tb-logo{display:flex;align-items:center;gap:8px;}
.tb-mark{width:18px;height:18px;background:var(--yellow);clip-path:polygon(50% 0%,0% 100%,100% 100%);}
.tb-name{font-size:13px;font-weight:900;color:var(--white);letter-spacing:-.02em;}
.tb-sep{width:1px;height:12px;background:rgba(255,255,255,.15);margin:0 8px;}
.tb-course{font-size:12px;color:rgba(255,255,255,.4);}
.tb-prog-wrap{display:flex;align-items:center;gap:10px;}
.tb-prog-bar{width:120px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;}
.tb-prog-fill{height:100%;background:var(--yellow);transition:width .5s;}
.tb-prog-text{font-size:11px;color:rgba(255,255,255,.4);font-weight:600;}
.tb-prog-text strong{color:var(--yellow);}

/* ── SIDEBAR + LAYOUT ── */
.app-layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 56px);}
.sidebar{background:var(--white);border-right:1px solid var(--border);padding:20px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;}
.sidebar-section{margin-bottom:8px;}
.sidebar-track{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mid);padding:12px 20px 6px;}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:all .14s;border-left:3px solid transparent;}
.sidebar-item:hover{background:var(--grey);border-left-color:var(--grey2);}
.sidebar-item.active{background:var(--blue-bg);border-left-color:var(--navy);}
.sidebar-item.done{border-left-color:var(--ok);}
.si-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
.si-text{flex:1;}
.si-title{font-size:13px;font-weight:600;color:var(--dark);line-height:1.2;}
.sidebar-item.active .si-title{color:var(--navy);font-weight:700;}
.si-sub{font-size:11px;color:var(--mid);margin-top:1px;}
.si-check{font-size:12px;color:var(--ok);flex-shrink:0;}

/* ── MAIN CONTENT ── */
.main{padding:0;}
.section-view{display:none;}
.section-view.active{display:block;}

/* Hero banner per section */
.section-hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy3) 100%);padding:48px 52px 56px;position:relative;overflow:hidden;}
.section-hero::after{content:'';position:absolute;top:-60px;right:-60px;width:300px;height:300px;background:radial-gradient(circle,rgba(255,255,0,.07) 0%,transparent 70%);pointer-events:none;}
.sh-track{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--yellow);margin-bottom:10px;}
.sh-title{font-size:clamp(24px,3vw,38px);font-weight:900;color:var(--white);letter-spacing:-.04em;line-height:1.08;margin-bottom:10px;}
.sh-sub{font-size:15px;color:rgba(255,255,255,.5);max-width:560px;line-height:1.6;font-weight:300;}
.sh-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:20px;}
.sh-chip{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.65);font-size:11px;font-weight:600;padding:5px 12px;border-radius:99px;}

/* ── CONTENT BODY ── */
.content-body{max-width:760px;margin:0 auto;padding:48px 52px 80px;}

/* Typography */
.lh2{font-size:20px;font-weight:800;letter-spacing:-.03em;margin-bottom:14px;display:flex;align-items:center;gap:10px;color:var(--navy);}
.lh2::before{content:'';display:block;width:4px;height:20px;background:var(--yellow);border-radius:2px;flex-shrink:0;}
.lh3{font-size:16px;font-weight:700;letter-spacing:-.02em;margin:24px 0 10px;color:var(--navy);}
.lp{font-size:15px;line-height:1.78;color:#374151;margin-bottom:14px;}
.lp strong{color:var(--navy);}
.lsec{margin-bottom:48px;}
.kt{background:var(--yellow);color:var(--navy);padding:1px 6px;border-radius:3px;font-weight:700;font-size:.93em;}
.kt2{background:var(--navy);color:var(--yellow);padding:1px 6px;border-radius:3px;font-weight:700;font-size:.93em;}

/* Callouts */
.callout{border-radius:8px;padding:18px 20px;margin:20px 0;display:flex;gap:14px;border-left:4px solid;}
.ci{font-size:20px;flex-shrink:0;margin-top:2px;}
.cb{flex:1;}
.ct{font-weight:700;font-size:14px;margin-bottom:5px;}
.cx{font-size:14px;line-height:1.68;}
.callout.tip{background:#FFFBEB;border-color:#F59E0B;}
.callout.tip .ct{color:#92400E;} .callout.tip .cx{color:#78350F;}
.callout.eg{background:var(--ok-bg);border-color:var(--ok);}
.callout.eg .ct{color:#14532D;} .callout.eg .cx{color:#166534;}
.callout.warn{background:var(--orange-bg);border-color:var(--orange);}
.callout.warn .ct{color:#9A3412;} .callout.warn .cx{color:#7C2D12;}
.callout.dark{background:var(--navy);border-color:var(--yellow);}
.callout.dark .ct{color:var(--yellow);} .callout.dark .cx{color:rgba(255,255,255,.8);}
.callout.info{background:var(--blue-bg);border-color:var(--blue);}
.callout.info .ct{color:#1E40AF;} .callout.info .cx{color:#1E3A8A;}

/* Defs table */
.defs{display:flex;flex-direction:column;gap:1px;margin:16px 0;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.def{display:grid;grid-template-columns:160px 1fr;background:var(--white);}
.def:nth-child(odd){background:#FAFAFA;}
.dt{font-size:13px;font-weight:700;padding:14px 16px;border-right:1px solid var(--border);color:var(--navy);line-height:1.4;}
.dd{font-size:13.5px;line-height:1.68;padding:14px 16px;color:#374151;}
@media(max-width:600px){.def{grid-template-columns:1fr;}.dt{border-right:none;border-bottom:1px solid var(--border);}}

/* Flow */
.flow{display:flex;flex-direction:column;margin:16px 0;}
.fstep{display:flex;gap:14px;padding-bottom:24px;}
.fstep:last-child{padding-bottom:0;}
.fstep-l{display:flex;flex-direction:column;align-items:center;}
.fnum{width:32px;height:32px;border-radius:50%;background:var(--yellow);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex-shrink:0;}
.fline{width:2px;flex:1;background:var(--border);margin-top:6px;}
.fstep:last-child .fline{display:none;}
.fcontent{padding-top:5px;flex:1;}
.ftitle{font-size:15px;font-weight:700;margin-bottom:4px;letter-spacing:-.01em;color:var(--navy);}
.fdesc{font-size:13.5px;color:var(--mid);line-height:1.58;}

/* Visual diagram boxes */
.diagram{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:24px;margin:20px 0;overflow:hidden;}
.diagram-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--mid);margin-bottom:16px;}

/* Strommarkt diagram */
.strom-flow{display:flex;align-items:center;gap:0;flex-wrap:wrap;}
.sf-box{background:var(--navy);color:var(--white);border-radius:8px;padding:12px 16px;text-align:center;font-size:12px;font-weight:700;min-width:90px;flex:1;}
.sf-box span{display:block;font-size:10px;color:rgba(255,255,255,.5);font-weight:400;margin-top:2px;}
.sf-box.yellow{background:var(--yellow);color:var(--navy);}
.sf-box.yellow span{color:rgba(0,0,0,.5);}
.sf-arrow{font-size:18px;color:var(--mid);padding:0 6px;flex-shrink:0;}

/* Stakeholder grid */
.stake-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin:16px 0;}
.stake-card{border:1.5px solid var(--border);border-radius:8px;padding:16px;background:var(--white);}
.stake-card.highlight{border-color:var(--yellow);background:#FFFBEB;}
.stake-icon{font-size:24px;margin-bottom:8px;}
.stake-name{font-size:13px;font-weight:800;margin-bottom:4px;color:var(--navy);}
.stake-desc{font-size:12px;color:var(--mid);line-height:1.45;}

/* Stat boxes */
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:16px 0;}
.stat-box{background:var(--navy);border-radius:8px;padding:16px;text-align:center;}
.stat-n{font-size:26px;font-weight:900;color:var(--yellow);letter-spacing:-.03em;line-height:1;}
.stat-l{font-size:11px;color:rgba(255,255,255,.5);line-height:1.4;margin-top:4px;}

/* Vergleich table */
.vtable{width:100%;border-collapse:collapse;margin:16px 0;font-size:13.5px;}
.vtable th{background:var(--navy);color:var(--white);padding:12px 14px;text-align:left;font-weight:700;font-size:12px;}
.vtable th:first-child{border-radius:8px 0 0 0;}
.vtable th:last-child{border-radius:0 8px 0 0;}
.vtable td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5;}
.vtable tr:nth-child(odd) td{background:#FAFAFA;}
.vtable tr:last-child td{border-bottom:none;}
.vtable .ok{color:var(--ok);font-weight:700;}
.vtable .no{color:var(--err);font-weight:700;}

/* Abrechnung visual */
.rechnung-box{background:var(--white);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin:16px 0;}
.rb-header{background:var(--navy);padding:14px 20px;color:var(--white);}
.rb-title{font-size:14px;font-weight:800;}
.rb-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;}
.rb-row{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);}
.rb-row:last-child{border-bottom:none;}
.rb-row.total{background:var(--navy);color:var(--white);}
.rb-row.solar{background:#F0FDF4;}
.rb-label{font-size:13.5px;font-weight:500;}
.rb-row.total .rb-label{font-weight:800;color:var(--white);}
.rb-row.solar .rb-label{color:var(--ok);}
.rb-val{font-size:14px;font-weight:700;color:var(--navy);}
.rb-row.total .rb-val{color:var(--yellow);}
.rb-row.solar .rb-val{color:var(--ok);}
.rb-detail{font-size:11px;color:var(--mid);margin-top:2px;}

/* Continue button */
.continue-btn{background:var(--navy);color:var(--white);border:none;border-radius:8px;padding:18px 36px;font-size:15px;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:10px;letter-spacing:-.01em;margin-top:48px;}
.continue-btn:hover{background:var(--yellow);color:var(--navy);}
.continue-btn .arrow{transition:transform .18s;}
.continue-btn:hover .arrow{transform:translateX(4px);}
.section-nav{display:flex;gap:12px;margin-top:48px;padding-top:32px;border-top:1px solid var(--border);}
.nav-prev{background:var(--white);color:var(--mid);border:1.5px solid var(--border);border-radius:8px;padding:14px 24px;font-size:14px;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;transition:all .15s;}
.nav-prev:hover{border-color:var(--navy);color:var(--navy);}
.nav-next{background:var(--navy);color:var(--white);border:none;border-radius:8px;padding:14px 32px;font-size:14px;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;transition:all .15s;flex:1;}
.nav-next:hover{background:var(--yellow);color:var(--navy);}

/* ── QUIZ ── */
.quiz-view{background:var(--white);border-radius:12px;border:1.5px solid var(--border);margin:32px 52px 80px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.quiz-header{background:var(--navy);padding:24px 32px;}
.qh-title{font-size:18px;font-weight:900;color:var(--white);letter-spacing:-.02em;margin-bottom:4px;}
.qh-sub{font-size:13px;color:rgba(255,255,255,.45);}
.qh-prog{display:flex;align-items:center;gap:12px;margin-top:16px;}
.qh-prog-bar{flex:1;height:4px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;}
.qh-prog-fill{height:100%;background:var(--yellow);transition:width .4s;}
.qh-prog-text{font-size:11px;color:rgba(255,255,255,.45);white-space:nowrap;font-weight:600;}

.quiz-body{padding:32px;}
.q-num{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--mid);margin-bottom:10px;}
.q-text{font-size:20px;font-weight:800;letter-spacing:-.03em;line-height:1.25;margin-bottom:8px;color:var(--navy);}
.q-hint{font-size:13px;color:var(--mid);margin-bottom:20px;font-style:italic;}

.opts{display:flex;flex-direction:column;gap:8px;}
.opt{background:var(--grey);border:1.5px solid transparent;border-radius:8px;padding:14px 18px;font-size:14px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;text-align:left;transition:all .13s;display:flex;align-items:center;gap:12px;color:var(--dark);}
.opt-l{width:28px;height:28px;border-radius:6px;background:var(--white);border:1.5px solid var(--border);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .13s;color:var(--mid);}
.opt:hover:not(:disabled){border-color:var(--navy);background:var(--white);}
.opt:hover:not(:disabled) .opt-l{background:var(--navy);color:var(--yellow);border-color:var(--navy);}
.opt.sel{border-color:var(--navy);background:var(--white);}
.opt.sel .opt-l{background:var(--navy);color:var(--yellow);border-color:var(--navy);}
.opt.correct{border-color:var(--ok);background:var(--ok-bg);}
.opt.correct .opt-l{background:var(--ok);color:white;border-color:var(--ok);}
.opt.wrong{border-color:var(--err);background:var(--err-bg);}
.opt.wrong .opt-l{background:var(--err);color:white;border-color:var(--err);}
.opt:disabled{cursor:default;}

.qta{width:100%;background:var(--grey);border:1.5px solid transparent;border-radius:8px;padding:16px;font-size:14.5px;font-family:'Inter',sans-serif;color:var(--dark);resize:vertical;min-height:120px;outline:none;transition:border-color .13s;line-height:1.6;}
.qta:focus{border-color:var(--navy);background:var(--white);}
.qta:disabled{opacity:.65;}

.tfl{display:flex;flex-direction:column;gap:8px;}
.tfi{background:var(--grey);border-radius:8px;padding:14px;}
.tfs{font-size:14px;font-weight:600;margin-bottom:10px;line-height:1.4;color:var(--navy);}
.tfbs{display:flex;gap:8px;}
.tfb{flex:1;padding:10px;background:var(--white);border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:all .13s;color:var(--mid);}
.tfb:hover:not(:disabled){border-color:var(--navy);color:var(--navy);}
.tfb.sel{border-color:var(--navy);color:var(--navy);}
.tfb.correct{border-color:var(--ok);color:var(--ok);background:var(--ok-bg);}
.tfb.wrong{border-color:var(--err);color:var(--err);background:var(--err-bg);}
.tfb.reveal{border-color:var(--ok);color:var(--ok);background:var(--ok-bg);}
.tfb:disabled{cursor:default;}

.quiz-actions{display:flex;gap:10px;margin-top:20px;}
.check-btn{background:var(--navy);color:var(--white);border:none;border-radius:8px;padding:14px 28px;font-size:14px;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;transition:all .13s;flex:1;}
.check-btn:hover{background:var(--yellow);color:var(--navy);}
.check-btn:disabled{opacity:.4;cursor:default;}
.next-q-btn{background:var(--white);color:var(--navy);border:1.5px solid var(--border);border-radius:8px;padding:14px 24px;font-size:14px;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;transition:all .13s;display:none;}
.next-q-btn.show{display:block;}
.next-q-btn:hover{border-color:var(--navy);}

/* AI Panel */
.ai-panel{background:var(--navy);border-radius:8px;overflow:hidden;margin-top:16px;display:none;}
.ai-panel.show{display:block;}
.ai-head{padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:9px;}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--yellow);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ai-lbl{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--yellow);}
.ai-msgs{padding:16px 18px;max-height:360px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;}
.aimsg{display:flex;gap:10px;}
.aimsg-av{width:26px;height:26px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;font-weight:900;}
.aimsg.coach .aimsg-av{background:var(--yellow);color:var(--navy);}
.aimsg.user .aimsg-av{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);}
.aimsg-bub{font-size:13.5px;line-height:1.7;color:rgba(255,255,255,.85);flex:1;padding-top:3px;}
.aimsg.user .aimsg-bub{color:rgba(255,255,255,.45);}
.typing{display:flex;gap:4px;padding-top:8px;}
.typing span{width:5px;height:5px;background:var(--yellow);border-radius:50%;animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}.typing span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}
.ai-inp-row{border-top:1px solid rgba(255,255,255,.07);padding:12px 18px;display:flex;gap:8px;}
.ai-inp{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:9px 13px;color:white;font-size:13.5px;font-family:'Inter',sans-serif;outline:none;transition:border-color .13s;}
.ai-inp:focus{border-color:var(--yellow);}
.ai-inp::placeholder{color:rgba(255,255,255,.22);}
.ai-sbtn{background:var(--yellow);border:none;border-radius:6px;width:37px;height:37px;color:var(--navy);font-size:15px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ai-sbtn:hover{opacity:.85;}.ai-sbtn:disabled{opacity:.3;cursor:default;}

/* Quiz score screen */
.score-wrap{padding:48px 32px;text-align:center;}
.score-em{font-size:56px;margin-bottom:16px;}
.score-h{font-size:30px;font-weight:900;letter-spacing:-.04em;margin-bottom:8px;color:var(--navy);}
.score-sub{font-size:14px;color:var(--mid);margin-bottom:28px;line-height:1.5;}
.score-big{font-size:72px;font-weight:900;letter-spacing:-.06em;line-height:1;color:var(--navy);}
.score-of{font-size:13px;color:var(--mid);margin-top:4px;margin-bottom:36px;font-weight:600;}
.score-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.score-next{background:var(--navy);color:var(--white);border:none;border-radius:8px;padding:16px 32px;font-size:14px;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;transition:all .15s;}
.score-next:hover{background:var(--yellow);color:var(--navy);}
.score-retry{background:none;color:var(--mid);border:1.5px solid var(--border);border-radius:8px;padding:16px 28px;font-size:14px;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;}
.score-retry:hover{border-color:var(--navy);color:var(--navy);}

/* Certificate */
#cert-screen{display:none;padding:52px 32px;background:var(--grey);min-height:calc(100vh - 56px);}
.cert-actions{display:flex;gap:10px;margin-bottom:32px;justify-content:center;}
.cert-print-btn{background:var(--navy);color:var(--white);border:none;border-radius:8px;padding:13px 26px;font-size:13.5px;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;}
.cert-print-btn:hover{background:var(--yellow);color:var(--navy);}
.cert-back-btn{background:none;color:var(--mid);border:1.5px solid var(--border);border-radius:8px;padding:13px 26px;font-size:13.5px;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;}
.cert-card{max-width:820px;margin:0 auto;background:var(--white);border:2px solid var(--navy);border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.1);}

<div class="lsec">
<h2 class="lh2">Strom — wie funktioniert das eigentlich?</h2>
<p class="lp">Bevor wir zu Mieterstrom kommen, schauen wir uns kurz an wie der normale Strommarkt funktioniert. Stell dir vor, du wohnst in einer Wohnung in München. Du steckst das Ladekabel deines Handys ein — und Strom fließt. Aber woher kommt der eigentlich?</p>

<div class="diagram">
<div class="diagram-title">Der Weg des Stroms — vom Kraftwerk zur Steckdose</div>
<div class="strom-flow">

  <div class="sf-arrow">→</div>
  <div class="sf-box">🗼 Übertragungs-netz<span>Fernleitungen 380kV</span></div>
  <div class="sf-arrow">→</div>
  <div class="sf-box">🏘️ Verteil-netz<span>Lokale Leitungen</span></div>
  <div class="sf-arrow">→</div>
  <div class="sf-box yellow">🏠 Deine Steckdose<span>Verbrauch in kWh</span></div>
</div>
</div>

<p class="lp">Dieser Weg ist lang — und jeder Schritt kostet Geld. Die <strong>Netzentgelte</strong> machen etwa 25% deiner Stromrechnung aus. Du zahlst also quasi "Maut" für die Benutzung dieser langen Leitungen.</p>

<div class="callout tip">
<div class="ci">💡</div>
<div class="cb"><div class="ct">Die Grundidee von Mieterstrom</div>
<div class="cx">Was wenn der Strom gar nicht diesen langen Weg nehmen müsste? Was wenn eine Solaranlage direkt auf dem Dach des Hauses den Strom erzeugt — und er direkt in die Wohnungen darunter fließt? Dann entfallen die Netzentgelte für diesen Anteil. Genau das ist Mieterstrom!</div></div>
</div>
</div>

<div class="lsec">
<h2 class="lh2">Mieterstrom — die einfache Erklärung</h2>
<p class="lp">Ein Vermieter lässt auf seinem Mehrfamilienhaus eine Solaranlage bauen. Der erzeugte Strom fließt direkt zu seinen Mietern. Für diesen "kurzen Weg" fallen keine Netzentgelte an — das spart Geld, das an die Mieter weitergegeben wird.</p>

<div class="flow">
<div class="fstep">
<div class="fstep-l"><div class="fnum">1</div><div class="fline"></div></div>
<div class="fcontent">
<div class="ftitle">PV-Anlage auf dem Dach</div>
<div class="fdesc">Solarmodule auf dem Dach des Mehrfamilienhauses erzeugen Strom — tagsüber, wenn die Sonne scheint. Die Größe der Anlage wird in <span style="font-weight:700">kWp</span> (Kilowattpeak) angegeben.</div>
</div></div>
<div class="fstep">
<div class="fstep-l"><div class="fnum">2</div><div class="fline"></div></div>
<div class="fcontent">
<div class="ftitle">Strom fließt direkt in die Wohnungen</div>
<div class="fdesc">Der Solarstrom fließt über die Hausleitungen direkt zu den Mietern — ohne öffentliches Netz. Kein langer Transportweg, keine Netzentgelte für diesen Anteil.</div>
</div></div>
<div class="fstep">
<div class="fstep-l"><div class="fnum">3</div><div class="fline"></div></div>
<div class="fcontent">
<div class="ftitle">Nachts oder bei Bewölkung: Reststrom aus dem Netz</div>
<div class="fdesc">Wenn die Sonne nicht reicht (nachts, im Winter, bei bedecktem Himmel), bezieht der Mieter Strom aus dem normalen Netz. Der Mieterstrom-Anbieter (ALVA) kümmert sich darum — der Mieter merkt davon nichts.</div>
</div></div>
<div class="fstep">
<div class="fstep-l"><div class="fnum">4</div><div class="fline"></div></div>
<div class="fcontent">
<div class="ftitle">Eine Rechnung, ein Anbieter</div>
<div class="fdesc">Der Mieter bekommt eine einzige Rechnung von ALVA — mit Solar- und Reststromanteil zusammen. Einfacher als normal!</div>
</div></div>
</div>

<div class="callout dark">
<div class="ci">📋</div>
<div class="cb"><div class="ct">Gesetzliche Grundlage: §42a EnWG</div>
<div class="cx">Mieterstrom ist gesetzlich geregelt. Der Mieterstrompreis darf maximal 90% des lokalen Grundversorgungstarifs betragen — der Mieter spart also mindestens 10%. Das ist kein Angebot, das ist <strong>Pflicht</strong>.</div></div>
</div>
</div>

<div class="lsec">
<h2 class="lh2">Was sind kWp und kWh? — Die zwei wichtigsten Einheiten</h2>
<p class="lp">Im Strombereich begegnen dir ständig diese zwei Abkürzungen. Du musst sie auseinanderhalten können:</p>

<div class="defs">
<div class="def">
<div class="dt">kWp<br><small style="font-weight:400;color:var(--mid)">Kilowattpeak</small></div>
<div class="dd"><strong>Leistung der PV-Anlage</strong> — wie viel Strom sie maximal erzeugen kann. "Wie groß ist die Anlage?" Eine 20 kWp Anlage erzeugt maximal 20 kW wenn die Sonne perfekt scheint.<br><br>Faustformel: <strong>1 kWp → ~900 kWh/Jahr</strong> in Deutschland. Eine 20 kWp Anlage erzeugt also ~18.000 kWh pro Jahr.</div>
</div>
<div class="def">
<div class="dt">kWh<br><small style="font-weight:400;color:var(--mid)">Kilowattstunde</small></div>
<div class="dd"><strong>Tatsächlich verbrauchte/erzeugte Energiemenge</strong> — "Wie viel Strom?" Das ist die Einheit auf deiner Stromrechnung. Ein Durchschnittshaushalt verbraucht 2.500–4.000 kWh pro Jahr.<br><br>Beispiel: Ein Föhn mit 1.000 Watt läuft 1 Stunde = 1 kWh verbraucht.</div>
</div>
</div>

<div class="callout eg">
<div class="ci">🧮</div>
<div class="cb"><div class="ct">Praxisbeispiel</div>
<div class="cx">Haus mit 10 Wohnungen, je 3.000 kWh/Jahr Verbrauch = 30.000 kWh Gesamtbedarf.<br>
PV-Anlage mit 20 kWp erzeugt ~18.000 kWh/Jahr.<br>
→ 18.000 / 30.000 = <strong>60% Autarkiequote</strong> — 60% des Stroms kommt direkt vom Dach, 40% aus dem Netz.</div></div>
</div>
</div>

<div class="lsec">
<h2 class="lh2">Warum ist Mieterstrom günstiger?</h2>
<p class="lp">Normale Stromrechnung: Du zahlst für Energie + Netznutzung + Steuern. Bei Mieterstrom entfällt ein Teil dieser Kosten:</p>

<div class="vtable-wrap" style="overflow-x:auto;">
<table class="vtable">
<thead><tr><th>Kostenbestandteil</th><th>Normaler Netzstrom</th><th>Mieterstrom (Solaranteil)</th></tr></thead>
<tbody>
<tr><td><strong>Energiekosten</strong></td><td>~11 ct/kWh</td><td>~11 ct/kWh (+ Mieterstromzuschlag)</td></tr>
<tr><td><strong>Netzentgelte</strong></td><td class="no">~8 ct/kWh ❌ zahlen</td><td class="ok">~0 ct/kWh ✅ entfällt!</td></tr>
<tr><td><strong>Konzessionsabgabe</strong></td><td class="no">~1-2 ct/kWh ❌</td><td class="ok">~0 ct/kWh ✅ entfällt!</td></tr>
<tr><td><strong>Stromsteuer</strong></td><td class="no">2,05 ct/kWh ❌</td><td class="ok">Oft entfällt ✅</td></tr>
<tr><td><strong>Mehrwertsteuer</strong></td><td class="no">19% ❌</td><td class="no">19% ❌ bleibt immer!</td></tr>
<tr><td style="font-weight:700">Typischer Gesamtpreis</td><td style="font-weight:700">~30 ct/kWh</td><td style="font-weight:700;color:var(--ok)">~21-24 ct/kWh</td></tr>
</tbody>
</table>
</div>

<div class="callout tip">
<div class="ci">💰</div>
<div class="cb"><div class="ct">Die Ersparnis in Zahlen</div>
<div class="cx">Haushalt mit 3.000 kWh/Jahr, 60% Solaranteil (1.800 kWh Solar + 1.200 kWh Netz):<br>
Normal: 3.000 × 30 ct = <strong>900€/Jahr</strong><br>
Mieterstrom: 1.800 × 22 ct + 1.200 × 30 ct = 396€ + 360€ = <strong>756€/Jahr</strong><br>
Ersparnis: <strong>~144€/Jahr (16%)</strong></div></div>
</div>
</div>`,

        {type:'mc', text:'Was ist der Hauptgrund warum Mieterstrom günstiger ist als normaler Netzstrom?',

    content: `
<div class="lsec">
<h2 class="lh2">Der Strommarkt — wer macht was?</h2>
<p class="lp">Im deutschen Strommarkt gibt es klare Rollen. Das wichtigste Prinzip: <span class="kt">Unbundling</span> — Netz und Vertrieb sind seit 1998 gesetzlich getrennt. Wer das Netz betreibt, darf keinen Strom verkaufen. Das schafft fairen Wettbewerb.</p>

<div class="stake-grid">
<div class="stake-card highlight">
<div class="stake-icon">⚡</div>
<div class="stake-name">ALVA Energie = Lieferant</div>
<div class="stake-desc">Kauft Strom ein, verkauft ihn an Mieter. Hat Liefervertrag mit Mieter. Stellt Rechnung. Das ist eure Rolle!</div>
</div>
<div class="stake-card">
<div class="stake-icon">🔌</div>
<div class="stake-name">VNB — Verteilnetzbetreiber</div>
<div class="stake-desc">Betreibt das lokale Stromnetz (Leitungen, Trafos). Über 800 in Deutschland. Neutral — muss alle Lieferanten gleich behandeln.</div>
</div>
<div class="stake-card">
<div class="stake-icon">📊</div>
<div class="stake-name">MSB — Messstellenbetreiber</div>
<div class="stake-desc">Baut und betreibt Stromzähler. Liefert Verbrauchsdaten. Oft identisch mit VNB (gMSB) oder freier Anbieter (wMSB).</div>
</div>
<div class="stake-card">
<div class="stake-icon">🏠</div>
<div class="stake-name">Anschlussnehmer</div>
<div class="stake-desc">Der Gebäudeeigentümer. Hat den Netzanschlussvertrag mit dem VNB. Im Mieterstrom: der Vermieter.</div>
</div>
<div class="stake-card">
<div class="stake-icon">👤</div>
<div class="stake-name">Anschlussnutzer</div>
<div class="stake-desc">Der Mieter. Hat den Stromliefervertrag (mit ALVA). Verbraucht den Strom. Ist unser direkter Kunde!</div>
</div>
<div class="stake-card">
<div class="stake-icon">🏛️</div>
<div class="stake-name">Grundversorger</div>
<div class="stake-desc">Jede Region hat einen. Wer keinen Vertrag hat wird automatisch versorgt — zu höheren Preisen. Sicherheitsnetz.</div>
</div>
</div>
</div>

<div class="lsec">
<h2 class="lh2">Der Verteilnetzbetreiber (VNB) — dein wichtigster Partner</h2>
<p class="lp">Im Mieterstrom-Alltag habt ihr viel mit dem VNB zu tun. Er verwaltet alle <span class="kt">GPKE-Prozesse</span> — das sind die standardisierten Abläufe für Lieferantenwechsel, Ein- und Auszüge.</p>

<div class="callout info">
<div class="ci">ℹ️</div>
<div class="cb"><div class="ct">Was ist GPKE?</div>
<div class="cx"><strong>G</strong>eschäftsprozesse zur <strong>K</strong>undenbelieferung mit <strong>E</strong>lektrizität. Von der Bundesnetzagentur festgelegte Standardprozesse. Jeder Lieferantenwechsel, jeder Ein- und Auszug läuft über GPKE-Nachrichten zwischen Lieferant und VNB. Ohne GPKE kein funktionierender Wechselmarkt.</div></div>
</div>

<h3 class="lh3">Was macht der VNB konkret für euch?</h3>
<div class="defs">
<div class="def"><div class="dt">Lieferanmeldung</div><div class="dd">Wenn ein neuer Mieter einzieht und Mieterstromkunde wird, muss ALVA ihn beim VNB anmelden (GPKE-Prozess). Erst dann läuft der Lieferbeginn offiziell.</div></div>
<div class="def"><div class="dt">Lieferabmeldung</div><div class="dd">Zieht ein Mieter aus oder kündigt, meldet ALVA ihn beim VNB ab. Zählerstand zum Stichtag wird erfasst.</div></div>
<div class="def"><div class="dt">Lieferantenwechsel</div><div class="dd">Will ein Mieter zu einem anderen Anbieter wechseln, koordiniert der VNB den Übergang. ALVA muss die MaLo-ID herausgeben — gesetzliche Pflicht!</div></div>
<div class="def"><div class="dt">Messkonzept bestätigen</div><div class="dd">Für neue Mieterstrom-Projekte muss der VNB das Messkonzept genehmigen (Summenzähler etc.). Ohne Bestätigung kein Go-Live.</div></div>
</div>

<div class="callout warn">
<div class="ci">⚠️</div>
<div class="cb"><div class="ct">Wichtig: MaLo-ID bei Kündigung</div>
<div class="cx">Die <strong>Marktlokations-ID (MaLo-ID)</strong> ist die eindeutige Kennnummer jedes Stromanschlusses. Wenn ein Mieterstromkunde zu einem anderen Anbieter wechseln will, MUSS ALVA die MaLo-ID herausgeben. Das ist gesetzlich vorgeschrieben — kein Ermessensspielraum. Verweigern ist verboten!</div></div>
</div>
</div>

<div class="lsec">
<h2 class="lh2">Der Messstellenbetreiber (MSB)</h2>
<p class="lp">Der MSB ist für Zähler zuständig — Einbau, Betrieb, Wartung und Datenlieferung. Es gibt zwei Arten:</p>

<div class="defs">
<div class="def"><div class="dt">gMSB<br><small style="font-weight:400;color:var(--mid)">grundzuständig</small></div><div class="dd">Der lokale VNB. Automatisch zuständig wenn kein anderer gewählt wurde. Hat die Pflicht bis 2032 alle Zähler auf iMSys umzustellen.</div></div>
<div class="def"><div class="dt">wMSB<br><small style="font-weight:400;color:var(--mid)">wettbewerblich</small></div><div class="dd">Freier Anbieter, bundesweit tätig. Für Mieterstrom-Projekte oft bevorzugt — kann das <strong>Liegenschaftsmodell</strong> anbieten: ein MSB für alle Zähler im Gebäude.</div></div>
</div>

<div class="callout tip">
<div class="ci">🏢</div>
<div class="cb"><div class="ct">Das Liegenschaftsmodell (MsbG)</div>
<div class="cx">Statt für jede Wohnung einen anderen MSB zu haben, übernimmt ein <strong>wMSB</strong> alle Messstellen im Gebäude als "Lokationsbündel": alle Wohnungszähler + PV-Erzeugungszähler + Summenzähler. Ein Ansprechpartner, koordinierter Einbau, sauberere Daten. Viel einfacher für den Go-Live eines neuen Projekts!</div></div>
</div>
</div>

<div class="lsec">
<h2 class="lh2">Das Zusammenspiel im Überblick</h2>
<div class="diagram">
<div class="diagram-title">Wer kommuniziert mit wem bei Mieterstrom?</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;text-align:center;font-size:12px;">
<div style="background:var(--navy);color:white;padding:16px;border-radius:8px;">
<div style="font-size:20px;margin-bottom:6px;">🏠</div>
<strong style="color:var(--yellow)">ALVA Energie</strong><br>

            {text:'iMSys überträgt Messwerte einmal pro Monat automatisch.', answer:false},
          ],
          ctx:'1. Wahr — §42a EnWG, mind. 10% Ersparnis. 2. Falsch — MaLo-ID muss IMMER herausgegeben werden, kein Ermessen. 3. Wahr — GNDEW Mai 2023. 4. Falsch — iMSys überträgt Viertelstundenwerte (alle 15 Minuten), nicht monatlich!'},
        {type:'open', text:'Was nimmst du als wichtigste Erkenntnis aus dieser Schulung mit? Was willst du in deiner ersten Woche besonders beachten?',
          keywords:['zählerstand','malo','wechsel','solar','abschlag','kommunikation','kunde','einfach'],
          ctx:'Freie Antwort — ALVA Coach gibt individuelle Rückmeldung. Die wichtigsten Punkte sollten sein: Zählerstand beim Einzug immer sofort erfassen, MaLo-ID-Pflicht bei Kündigung, Wechselrecht respektieren, Solar schwankt (wichtig für Kundenerklärung), einfach und verständlich kommunizieren.'}
      ]
    }
  }
];

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let STATE = {
  currentSection: 0,
  currentView: 'lesson', // 'lesson' | 'quiz'
  sectionState: {}, // per section: {lessonDone, quizDone, quizScore}
  quizState: null
};

function loadState() {
  try {
    const s = localStorage.getItem('alva_es_state');
    if (s) STATE = JSON.parse(s);
  } catch(e){}
}
function saveState() {
  localStorage.setItem('alva_es_state', JSON.stringify(STATE));
}
loadState();

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function init() {
  renderSidebar();
  renderSection(STATE.currentSection);
  updateProgress();
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';
  html += `<div class="sidebar-section">
    <div class="sidebar-track">Einstieg in den Mieterstrom</div>`;
  
  SECTIONS.forEach((sec, i) => {
    const ss = STATE.sectionState[i] || {};
    const isActive = STATE.currentSection === i && STATE.currentView === 'lesson';
    const isQuizActive = STATE.currentSection === i && STATE.currentView === 'quiz';
    const done = ss.quizDone;
    const quizScore = ss.quizDone ? (ss.quizScore + '/' + sec.quiz?.questions.length + ' Punkte') : 'Noch nicht gemacht';
    const lessonStatus = ss.lessonDone ? (ss.quizDone ? '✅ Abgeschlossen' : '📝 Quiz offen') : '📖 Lerneinheit';
    
    html += '<div class="sidebar-item ' + (isActive?'active':'') + ' ' + (done?'done':'') + '" data-section="' + i + '" style="cursor:pointer">' +
      '<div class="si-icon">' + sec.icon + '</div>' +
      '<div class="si-text">' +
        '<div class="si-title">' + (i+1) + '. ' + sec.title + '</div>' +
        '<div class="si-sub">' + lessonStatus + '</div>' +
      '</div>' +
      (done ? '<div class="si-check">✓</div>' : '') +
    '</div>';
    if (sec.quiz) {
      html += '<div class="sidebar-item ' + (isQuizActive?'active':'') + '" data-quiz="' + i + '" style="padding-left:40px;cursor:pointer">' +
        '<div class="si-icon">📝</div>' +
        '<div class="si-text">' +
          '<div class="si-title" style="font-size:12px">Quiz — ' + sec.quiz.title + '</div>' +
          '<div class="si-sub">' + (ss.quizDone ? quizScore : 'Noch nicht gemacht') + '</div>' +
        '</div>' +
      '</div>';
    }
  });
  
  html += '</div>';
  sb.innerHTML = html;
  
  // Event delegation - attach once after innerHTML set
  sb.onclick = function(e) {
    const item = e.target.closest('[data-section]');
    const quiz = e.target.closest('[data-quiz]');
    if (quiz) { showQuizView(parseInt(quiz.dataset.quiz)); return; }
    if (item) { showSection(parseInt(item.dataset.section)); return; }
  };
}

function renderSection(idx) {
  const sec = SECTIONS[idx];
  STATE.currentSection = idx;
  STATE.currentView = 'lesson';
  
  const main = document.getElementById('main-content');
  document.getElementById('cert-screen').style.display = 'none';
  
  const ss = STATE.sectionState[idx] || {};
  const isLast = idx === SECTIONS.length - 1;
  const allDone = SECTIONS.every((s,i) => (STATE.sectionState[i]||{}).quizDone);
  
  // Nav buttons
  let navHtml = `<div class="section-nav">
    ${idx > 0 ? `<button class="nav-prev" onclick="showSection(${idx-1})">← ${SECTIONS[idx-1].title}</button>` : '<div></div>'}
    ${sec.quiz ? `<button class="nav-next" onclick="showQuizView(${idx})">Quiz starten →</button>` :
      idx < SECTIONS.length-1 ? `<button class="nav-next" onclick="showSection(${idx+1})">Weiter: ${SECTIONS[idx+1].title} →</button>` : 
      allDone ? `<button class="nav-next" onclick="showCert()">🎓 Zertifikat ansehen</button>` : ''}
  </div>`;
  
  var heroHtml = '<div class="section-hero">' +
    '<div class="sh-track">' + (idx+1) + ' / ' + SECTIONS.length + ' — Energy Services Schulung</div>' +
    '<div class="sh-title">' + sec.title + '</div>' +
    '<div class="sh-sub">' + sec.subtitle + '</div>' +
    '<div class="sh-chips">' + sec.chips.map(function(c){return '<div class="sh-chip">'+c+'</div>';}).join('') + '</div>' +
  '</div>';
  var bodyHtml = '<div class="content-body">' + sec.content + navHtml + '</div>';
  var quizHtml = sec.quiz ? renderQuizSection(idx) : '';
  main.innerHTML = heroHtml + bodyHtml + quizHtml;
  
  // Mark lesson as done immediately
  if (!STATE.sectionState[idx]) STATE.sectionState[idx] = {};
  STATE.sectionState[idx].lessonDone = true;
  saveState();
  renderSidebar();
  updateProgress();
  window.scrollTo(0,0);
}

function renderQuizSection(idx) {
  const sec = SECTIONS[idx];
  const ss = STATE.sectionState[idx] || {};
  
  return `<div class="quiz-view" id="quiz-section-${idx}" style="display:none">
    <div class="quiz-header">
      <div class="qh-title">📝 ${sec.quiz.title}</div>
      <div class="qh-sub">${sec.quiz.questions.length} Fragen · ALVA Coach gibt Feedback zu jeder Antwort</div>
      <div class="qh-prog">
        <div class="qh-prog-bar"><div class="qh-prog-fill" id="qpf-${idx}" style="width:0%"></div></div>
        <div class="qh-prog-text" id="qpt-${idx}">0 / ${sec.quiz.questions.length}</div>
      </div>
    </div>
    <div id="quiz-body-${idx}" class="quiz-body"></div>
  </div>`;
}

function showQuizView(idx) {
  STATE.currentView = 'quiz';
  // Always mark lesson as done when quiz is accessed
  if (!STATE.sectionState[idx]) STATE.sectionState[idx] = {};
  STATE.sectionState[idx].lessonDone = true;
  saveState();
  // Re-render section if not current
  if (STATE.currentSection !== idx) {
    renderSection(idx);
  }
  renderSidebar();
  const qv = document.getElementById('quiz-section-' + idx);
  if (!qv) { renderSection(idx); setTimeout(()=>showQuizView(idx), 150); return; }
  qv.style.display = 'block';
  STATE.quizState = {idx, qi:0, score:0, hist:{}};
  renderQuestion(idx);
  setTimeout(()=>qv.scrollIntoView({behavior:'smooth', block:'start'}), 100);
}

let tfAnswers = {};
function renderQuestion(idx) {
  const sec = SECTIONS[idx];
  const qs = STATE.quizState;
  const q = sec.quiz.questions[qs.qi];
  const total = sec.quiz.questions.length;
  const pct = ((qs.qi+1)/total)*100;
  
  document.getElementById(`qpf-${idx}`).style.width = pct+'%';
  document.getElementById(`qpt-${idx}`).textContent = `${qs.qi+1} / ${total}`;
  
  const body = document.getElementById(`quiz-body-${idx}`);
  body.innerHTML = `
    <div class="q-num">Frage ${qs.qi+1} von ${total}</div>
    <div class="q-text">${q.text}</div>
    ${renderQBody(q)}
    <div class="ai-panel" id="aip-${idx}">
      <div class="ai-head"><div class="ai-dot"></div><div class="ai-lbl">ALVA Coach</div></div>
      <div class="ai-msgs" id="aim-${idx}"></div>
      <div class="ai-inp-row">
        <input class="ai-inp" id="ai-in-${idx}" placeholder="Rückfrage stellen..." onkeydown="if(event.key==='Enter')followup(${idx})"/>
        <button class="ai-sbtn" id="ai-sb-${idx}" onclick="followup(${idx})">↑</button>
      </div>
    </div>
    <div class="quiz-actions">
      <button class="check-btn" id="chk-${idx}" onclick="checkAnswer(${idx})">Antwort prüfen →</button>
      <button class="next-q-btn" id="nxt-${idx}" onclick="nextQuestion(${idx})">${qs.qi+1<total?'Nächste Frage →':'Ergebnis ansehen 🎓'}</button>
    </div>`;
}

function renderQBody(q) {
  if (q.type==='mc') return `<div class="opts">${q.options.map((o,i)=>`<button class="opt" data-i="${i}" onclick="selOpt(this)"><span class="opt-l">${'ABCD'[i]}</span>${o}</button>`).join('')}</div>`;
  if (q.type==='open') return `<p class="q-hint">Schreib in eigenen Worten — ALVA Coach gibt dir ausführliches, persönliches Feedback.</p><textarea class="qta" id="qta" placeholder="Deine Antwort hier..."></textarea>`;
  if (q.type==='tf') {
    tfAnswers={};
    return `<div class="tfl">${q.statements.map((s,si)=>`<div class="tfi"><div class="tfs">${s.text}</div><div class="tfbs"><button class="tfb" data-si="${si}" data-v="1" onclick="selTF(this)">✅ Wahr</button><button class="tfb" data-si="${si}" data-v="0" onclick="selTF(this)">❌ Falsch</button></div></div>`).join('')}</div>`;
  }
}

function selOpt(btn){document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}
function selTF(btn){const si=btn.dataset.si;btn.closest('.tfbs').querySelectorAll('.tfb').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');tfAnswers[si]=btn.dataset.v==='1';}

function checkAnswer(idx) {
  const sec = SECTIONS[idx];
  const qs = STATE.quizState;
  const q = sec.quiz.questions[qs.qi];
  let ua='', ok=false;
  
  if(q.type==='mc'){
    const s=document.querySelector('.opt.sel');if(!s){showToast('Bitte wähle eine Antwort!');return;}
    const i=parseInt(s.dataset.i);document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
    if(i===q.correct){s.classList.add('correct');ok=true;qs.score++;}
    else{s.classList.add('wrong');document.querySelectorAll('.opt')[q.correct].classList.add('correct');}
    ua=`Option ${'ABCD'[i]}: ${q.options[i]}`;
  }
  if(q.type==='open'){
    const v=document.getElementById('qta')?.value?.trim();if(!v){showToast('Bitte schreib eine Antwort!');return;}
    document.getElementById('qta').disabled=true;
    ok=q.keywords.filter(k=>v.toLowerCase().includes(k)).length>=Math.max(1,Math.ceil(q.keywords.length*.22));
    if(ok)qs.score++;ua=v;
  }
  if(q.type==='tf'){
    if(Object.keys(tfAnswers).length<q.statements.length){showToast('Beantworte alle Aussagen!');return;}
    let c=0;
    document.querySelectorAll('.tfi').forEach((item,si)=>{
      const btns=item.querySelectorAll('.tfb');btns.forEach(b=>{b.disabled=true;b.classList.remove('sel');});
      const ui=tfAnswers[si]?0:1,ci=q.statements[si].answer?0:1;
      if(tfAnswers[si]===q.statements[si].answer){btns[ui].classList.add('correct');c++;}
      else{btns[ui].classList.add('wrong');btns[ci].classList.add('reveal');}
    });
    ok=c===q.statements.length;if(ok)qs.score++;
    ua=q.statements.map((s,si)=>`"${s.text}" → ${tfAnswers[si]?'Wahr':'Falsch'}`).join(' | ');
  }
  
  document.getElementById(`chk-${idx}`).style.display='none';
  document.getElementById(`nxt-${idx}`).className='next-q-btn show';
  askCoach(idx, q, ua, ok);
}

async function askCoach(idx, q, answer, ok) {
  document.getElementById(`aip-${idx}`).className='ai-panel show';
  const prompt=`Du bist ALVA Coach — Lerncoach für neue Customer Support Mitarbeiter bei ALVA Energie (Mieterstrom, Energiewirtschaft).

Hintergrund & korrekte Antwort: ${q.ctx}

Antwort des Lernenden: "${answer}"
Bewertet als: ${ok?'RICHTIG ✅':'FALSCH ❌'}

Gib konkretes, lehrreiches Feedback (150-200 Wörter):
1. Direkt sagen ob richtig oder falsch
2. WARUM — konkretes Fachwissen aus dem Strommarkt
3. Was bedeutet das konkret im ALVA Customer Support Alltag?
4. Merkhilfe wenn hilfreich

Ton: direkt, freundlich-professionell, konkret. Auf Deutsch. Kein Fachjargon ohne Erklärung.`;

  if(!qs_hist[qs_key(idx)]) qs_hist[qs_key(idx)] = [];
  qs_hist[qs_key(idx)].push({role:'user',content:prompt});
  
  const tid='T'+Date.now();
  addCoachMsg(idx,'<div class="typing"><span></span><span></span><span></span></div>',tid,'coach');
  
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:'Du bist ALVA Coach für neue ALVA Energie Mitarbeiter. Erkläre Mieterstrom und Energiewirtschaft verständlich, direkt und praxisnah. Auf Deutsch.',
        messages:qs_hist[qs_key(idx)]})});
    const d=await r.json();
    const reply=d.content?.find(c=>c.type==='text')?.text||'Verbindungsfehler.';
    document.getElementById(tid)?.remove();
    addCoachMsg(idx,reply.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>'),'','coach');
    qs_hist[qs_key(idx)].push({role:'assistant',content:reply});
  }catch(e){document.getElementById(tid)?.remove();addCoachMsg(idx,'⚠️ Verbindungsfehler. Internetverbindung prüfen.','','coach');}
}

const qs_hist = {};
function qs_key(idx) { return `${idx}_${STATE.quizState?.qi||0}`; }

async function followup(idx) {
  const inp=document.getElementById(`ai-in-${idx}`),msg=inp.value.trim();
  if(!msg)return;inp.value='';document.getElementById(`ai-sb-${idx}`).disabled=true;
  addCoachMsg(idx,msg,'','user');
  const key=qs_key(idx);
  if(!qs_hist[key])qs_hist[key]=[];
  qs_hist[key].push({role:'user',content:msg});
  const tid='T'+Date.now();
  addCoachMsg(idx,'<div class="typing"><span></span><span></span><span></span></div>',tid,'coach');
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:'Du bist ALVA Coach für neue ALVA Energie Mitarbeiter. Auf Deutsch.',
        messages:qs_hist[key]})});
    const d=await r.json();
    const reply=d.content?.find(c=>c.type==='text')?.text||'Fehler.';
    document.getElementById(tid)?.remove();
    addCoachMsg(idx,reply.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>'),'','coach');
    qs_hist[key].push({role:'assistant',content:reply});
  }catch(e){document.getElementById(tid)?.remove();addCoachMsg(idx,'⚠️ Verbindungsfehler.','','coach');}
  document.getElementById(`ai-sb-${idx}`).disabled=false;
}

function addCoachMsg(idx, html, id, role) {
  const el=document.createElement('div');el.className=`aimsg ${role}`;if(id)el.id=id;
  el.innerHTML=`<div class="aimsg-av">${role==='coach'?'A':'👤'}</div><div class="aimsg-bub">${html}</div>`;
  const msgs=document.getElementById(`aim-${idx}`);if(msgs){msgs.appendChild(el);msgs.scrollTop=msgs.scrollHeight;}
}

function nextQuestion(idx) {
  const sec = SECTIONS[idx];
  const qs = STATE.quizState;
  const total = sec.quiz.questions.length;
  
  if (qs.qi+1 >= total) {
    showQuizScore(idx);
  } else {
    qs.qi++;
    tfAnswers={};
    renderQuestion(idx);
    document.getElementById(`quiz-section-${idx}`).scrollIntoView({behavior:'smooth', block:'start'});
  }
}

function showQuizScore(idx) {
  const sec = SECTIONS[idx];
  const qs = STATE.quizState;
  const total = sec.quiz.questions.length;
  const pct = qs.score/total;
  
  // Save
  if (!STATE.sectionState[idx]) STATE.sectionState[idx] = {};
  STATE.sectionState[idx].quizDone = true;
  STATE.sectionState[idx].quizScore = qs.score;
  STATE.sectionState[idx].lessonDone = true;
  saveState();
  renderSidebar();
  updateProgress();
  
  let em, title, sub;
  if(pct===1){em='🏆';title='Perfekt!';sub='Alle Fragen richtig — ausgezeichnete Leistung!';}
  else if(pct>=.75){em='✅';title='Sehr gut!';sub='Starke Leistung — du bist gut vorbereitet!';}
  else if(pct>=.5){em='👍';title='Gut gemacht!';sub='Solide Basis — lies das Kapitel nochmal wenn du magst.';}
  else{em='📖';title='Nochmal üben!';sub='Kein Problem — geh nochmal durch die Lerneinheit.';}
  
  const allDone = SECTIONS.every((s,i) => (STATE.sectionState[i]||{}).quizDone);
  const nextIdx = idx+1;
  const hasNext = nextIdx < SECTIONS.length;
  
  document.getElementById(`quiz-body-${idx}`).innerHTML = `
    <div class="score-wrap">
      <div class="score-em">${em}</div>
      <div class="score-h">${title}</div>
      <div class="score-sub">${sub}</div>
      <div class="score-big">${qs.score}</div>
      <div class="score-of">von ${total} Punkten — ${sec.quiz.title}</div>
      <div class="score-btns">
        ${allDone ? `<button class="score-next" onclick="showCert()">🎓 Zertifikat ansehen</button>` :
          hasNext ? `<button class="score-next" onclick="showSection(${nextIdx})">Nächstes Kapitel →</button>` :
          `<button class="score-next" onclick="showSection(0)">Zum Anfang</button>`}
        <button class="score-retry" onclick="retryQuiz(${idx})">Wiederholen</button>
      </div>
    </div>`;
}

function retryQuiz(idx) {
  STATE.quizState = {idx, qi:0, score:0, hist:{}};
  renderQuestion(idx);
}

function showSection(idx) {
  document.getElementById('cert-screen').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  renderSection(idx);
  window.scrollTo(0,0);
}

function showCert() {
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('cert-screen').style.display = 'block';
  window.scrollTo(0,0);
  
  const name = prompt('Dein Name für das Zertifikat:') || 'ALVA Mitarbeiter*in';
  const today = new Date();
  const dateStr = today.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
  const totalScore = SECTIONS.reduce((a,s,i)=>{const ss=STATE.sectionState[i]||{};return a+(ss.quizScore||0);},0);
  const maxScore = SECTIONS.reduce((a,s)=>a+(s.quiz?s.quiz.questions.length:0),0);
  const pct = Math.round((totalScore/maxScore)*100);
  
  document.getElementById('cert-card').innerHTML = `
    <div class="cert-top">
      <div class="cert-logo-row"><div class="cert-mark"></div><div class="cert-wm">ALVA Akademie</div></div>
      <div class="cert-ey">Schulungszertifikat · Energy Services</div>
      <div class="cert-title">Einstieg in den <span class="hl">B2C Strommarkt</span><br>& <span class="hl">Mieterstrom</span></div>
    </div>
    <div class="cert-body">
      <div class="cert-pres">Hiermit bestätigen wir, dass</div>
      <div class="cert-name">${name}</div>
      <div class="cert-details">
        <div><div class="cert-dl">Abschlussdatum</div><div class="cert-dv">${dateStr}</div></div>
        <div><div class="cert-dl">Module</div><div class="cert-dv">${SECTIONS.length} / ${SECTIONS.length}</div></div>
        <div><div class="cert-dl">Punkte</div><div class="cert-dv">${totalScore} / ${maxScore} (${pct}%)</div></div>
      </div>
      <div class="cert-modules">
        <div class="cert-modules-title">Abgeschlossene Module</div>
        <div class="cert-mod-list">
          ${SECTIONS.map(s=>`<div class="cert-mod-item"><div class="cert-mod-check">✓</div>${s.icon} ${s.title}</div>`).join('')}
        </div>
      </div>
      <div class="cert-footer">
        <div>
          <div class="cert-sig-line"></div>
          <div class="cert-sig-name">ALVA Energie GmbH</div>
          <div class="cert-sig-sub">ALVA Akademie · Energy Services Onboarding</div>
        </div>
        <div class="cert-seal"><div class="cert-seal-t">ALVA<br>AKADEMIE</div><div class="cert-seal-y">${today.getFullYear()}</div></div>
      </div>
    </div>`;
}

function updateProgress() {
  const total = SECTIONS.filter(s=>s.quiz).length;
  const done = SECTIONS.filter((s,i)=>s.quiz&&(STATE.sectionState[i]||{}).quizDone).length;
  const pct = Math.round((done/total)*100);
  document.getElementById('topbar-prog').style.width = pct+'%';
  document.getElementById('topbar-text').innerHTML = `<strong>${pct}%</strong>`;
}

function showToast(msg) {
  const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',2500);
}

document.addEventListener("DOMContentLoaded", function() { init(); });
</script>
